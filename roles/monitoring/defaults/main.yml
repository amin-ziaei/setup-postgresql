---
# ─── Postgres Exporter ────────────────────────────────────────────────────────
postgres_exporter_version: "0.19.1"
postgres_exporter_install_dir: /usr/local/bin
postgres_exporter_user: postgres_exporter
postgres_exporter_group: postgres_exporter
postgres_exporter_port: 9187
postgres_exporter_web_listen_address: "0.0.0.0:{{ postgres_exporter_port }}"
postgres_exporter_config_file: /etc/postgres_exporter.yml

# Monitoring DB user (created by the role)
postgres_monitor_user: postgres_exporter_monitor
postgres_monitor_password: "ChangeMe_MonitorPassword!"

# DSN for postgres_exporter (uses the dedicated monitoring user above)
postgres_exporter_dsn: "postgresql://{{ postgres_monitor_user }}:{{ postgres_monitor_password }}@localhost:{{ postgresql_port }}/postgres?sslmode=disable"

# ─── Firewall ─────────────────────────────────────────────────────────────────
# Set to true to open exporter ports via UFW
monitoring_open_firewall: false
monitoring_allowed_cidr: "10.0.0.0/8"    # Prometheus scrape source
