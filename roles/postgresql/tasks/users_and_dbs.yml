---
- name: Create PostgreSQL users
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    role_attr_flags: "{{ item.role_attr_flags | default('NOSUPERUSER') }}"
    state: present
  become: true
  become_user: postgres
  loop: "{{ postgresql_users }}"
  no_log: true
  tags: [postgresql]

- name: Create PostgreSQL databases
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    encoding: "{{ item.encoding | default('UTF-8') }}"
    lc_collate: "{{ item.lc_collate | default('en_US.UTF-8') }}"
    lc_ctype: "{{ item.lc_ctype | default('en_US.UTF-8') }}"
    owner: "{{ item.owner | default('postgres') }}"
    state: present
  become: true
  become_user: postgres
  loop: "{{ postgresql_databases }}"
  tags: [postgresql]

- name: Grant user privileges on database
  community.postgresql.postgresql_privs:
    database: "{{ item.db }}"
    roles: "{{ item.name }}"
    privs: ALL
    type: database
    state: present
  become: true
  become_user: postgres
  loop: "{{ postgresql_users }}"
  when: item.db is defined
  tags: [postgresql]

- name: Enable PostgreSQL extensions
  community.postgresql.postgresql_ext:
    name: "{{ item.name }}"
    db: "{{ item.db }}"
    state: present
  become: true
  become_user: postgres
  loop: "{{ postgresql_extensions }}"
  tags: [postgresql]
