---
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
    state: present
    update_cache: true
  tags: [postgresql]

- name: Ensure PostgreSQL APT key directory exists
  ansible.builtin.file:
    path: "{{ postgresql_apt_key_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [postgresql]

- name: Download PostgreSQL APT signing key
  ansible.builtin.get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: "{{ postgresql_apt_key_path }}"
    owner: root
    group: root
    mode: "0644"
  tags: [postgresql]

- name: Configure PostgreSQL APT repository
  ansible.builtin.copy:
    dest: "{{ postgresql_apt_repository_file }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: {{ postgresql_apt_repository_types }}
      URIs: {{ postgresql_apt_repository_url }}
      Suites: {{ postgresql_apt_repository_suite }}
      Architectures: {{ postgresql_apt_repository_architecture }}
      Components: {{ postgresql_apt_repository_components }}
      Signed-By: {{ postgresql_apt_key_path }}
  register: _postgresql_apt_repository
  tags: [postgresql]

- name: Update APT cache after PostgreSQL repository changes
  ansible.builtin.apt:
    update_cache: true
  when: _postgresql_apt_repository.changed
  tags: [postgresql]

- name: Install PostgreSQL packages
  ansible.builtin.apt:
    name: "{{ postgresql_packages }}"
    state: present
    update_cache: true
  notify: Restart PostgreSQL
  tags: [postgresql]

- name: Ensure PostgreSQL service is enabled and started
  ansible.builtin.service:
    name: "{{ postgresql_service_name }}"
    state: started
    enabled: true
  tags: [postgresql]
